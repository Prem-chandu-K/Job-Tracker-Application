<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Job Tracker</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #43cea2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2bbd8c;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .success {
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>

    <div th:if="${success}" class="success">
        Registration successful! Please login.
    </div>

    <form th:action="@{/register}" method="post">
        <input type="text" name="username" placeholder="Username" required/>
        <input type="password" name="password" placeholder="Password" required/>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        <a th:href="@{/login}">Back to Login</a>
    </div>
</div>

</body>
</html>
